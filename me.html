<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Me — Elliot Gross</title>
  <meta name="description" content="More about Elliot Gross.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,200..500;1,6..72,200..500&display=swap" rel="stylesheet">

  <style>
    :root {
      --paper:  #FBFAF6;
      --ink:    #20211F;
      --muted:  #6F6C66;
      --rule:   #E5E1D8;
      --accent: #3E5A6E;

      --measure: 34rem;
      --pad: clamp(1.5rem, 5vw, 3rem);
    }

    * { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; }

    body {
      margin: 0;
      background: var(--paper);
      color: var(--ink);
      font-family: "Newsreader", Georgia, "Times New Roman", serif;
      font-optical-sizing: auto;
      font-weight: 400;
      line-height: 1.6;
      font-size: 1.125rem;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    .page {
      min-height: 100vh;
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      max-width: calc(54rem + var(--pad) * 2);
      margin: 0 auto;
      padding: clamp(2rem, 6vh, 4rem) var(--pad) 2.5rem;
    }

    /* top nav — top right */
    .nav {
      display: flex;
      justify-content: flex-end;
      gap: 2.2rem;
      margin: 0 0 3rem;
      font-size: 1.05rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .nav a {
      color: var(--ink);
      text-decoration: none;
      padding-bottom: 3px;
      border-bottom: 1px solid transparent;
      transition: color 0.2s ease, border-color 0.2s ease;
    }
    .nav a:hover { color: var(--accent); }
    .nav a[aria-current="page"] {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }
    .nav a:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 3px;
      border-radius: 1px;
    }

    h1 {
      font-size: clamp(2.2rem, 6vw, 3rem);
      font-weight: 300;
      letter-spacing: -0.015em;
      line-height: 1.05;
      margin: 0 0 0.8rem;
    }

    .lede {
      color: var(--muted);
      font-weight: 300;
      font-size: 1.2rem;
      margin: 0 0 2.6rem;
      max-width: 32rem;
    }

    /* "currently into" list */
    .now { margin: 0; }
    .now-item {
      display: flex;
      gap: clamp(1.2rem, 4vw, 2.6rem);
      padding: 1.7rem 0;
      border-top: 1px solid var(--rule);
    }
    .now-item:last-child { border-bottom: 1px solid var(--rule); }
    .now-label {
      flex: 0 0 7.5rem;
      font-style: italic;
      color: var(--muted);
      font-size: 1.05rem;
      padding-top: 0.2rem;
    }
    .now-body { flex: 1 1 0; min-width: 0; display: flex; gap: 1.1rem; align-items: flex-start; }
    .now-thumb {
      flex: 0 0 auto;
      height: 104px;
      width: auto;
      border: 1px solid var(--rule);
      background: #fff;
      display: block;
    }
    .now-text { min-width: 0; }
    .now-title { font-size: 1.25rem; line-height: 1.25; }
    .now-title em { font-style: italic; }
    .now-sub { color: var(--muted); margin-top: 0.15rem; }
    .now-stars { color: var(--accent); letter-spacing: 0.06em; margin-top: 0.3rem; }
    /* film poster row */
    .films { display: flex; flex-wrap: wrap; gap: 1.1rem; }
    .film { width: 102px; margin: 0; }
    .film img {
      width: 100%;
      aspect-ratio: 2 / 3;
      object-fit: cover;
      border: 1px solid var(--rule);
      background: #fff;
      display: block;
    }
    .film .now-stars { margin-top: 0.35rem; font-size: 0.82rem; text-align: center; }
    /* songs (text only) */
    .songs { list-style: none; margin: 0; padding: 0; }
    .songs li { margin: 0; }
    .songs li + li { margin-top: 0.7rem; }
    .song-when {
      display: inline-block;
      min-width: 7rem;
      padding-right: 0.7rem;
      font-size: 0.82rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .song-title { font-size: 1.12rem; }
    .song-title .sub { color: var(--muted); font-size: 1rem; }
    .now-foot { margin: 1.6rem 0 0; font-size: 0.85rem; color: var(--muted); font-style: italic; }
    .now-msg { color: var(--muted); }

    @media (max-width: 620px) {
      .now-item { flex-direction: column; gap: 0.5rem; }
      .now-label { flex-basis: auto; padding-top: 0; }
      .song-when { display: block; min-width: 0; margin-bottom: 0.1rem; }
    }

    footer {
      margin-top: auto;
      padding-top: 4rem;
      font-size: 0.82rem;
      letter-spacing: 0.04em;
      color: var(--muted);
    }

    .reveal {
      opacity: 0;
      transform: translateY(0.6rem);
      animation: rise 0.7s cubic-bezier(0.2, 0.65, 0.3, 1) forwards;
    }
    .reveal:nth-child(1) { animation-delay: 0.05s; }
    .reveal:nth-child(2) { animation-delay: 0.16s; }
    .reveal:nth-child(3) { animation-delay: 0.27s; }

    @keyframes rise { to { opacity: 1; transform: none; } }

    @media (prefers-reduced-motion: reduce) {
      .reveal { animation: none; opacity: 1; transform: none; }
    }
  </style>
</head>
<body>
  <main class="page">

    <nav class="nav reveal">
      <a href="index.html">Home</a>
      <a href="writing.html">Writing</a>
      <a href="me.html" aria-current="page">Me</a>
    </nav>

    <h1 class="reveal">Me</h1>

    <p class="lede reveal">A little of what I&rsquo;m into lately &mdash; pulled in automatically.</p>

    <section class="now reveal" id="now" aria-live="polite">
      <p class="now-msg">Loading&hellip;</p>
    </section>

    <footer>
      &copy; <span id="year"></span> Elliot Gross
    </footer>

  </main>

  <script>
    document.getElementById("year").textContent = new Date().getFullYear();

    (function () {
      var now = document.getElementById("now");

      function esc(s) {
        return String(s == null ? "" : s).replace(/[&<>"]/g, function (c) {
          return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c];
        });
      }

      function stars(r) {
        if (!r || r <= 0) return "";
        var full = Math.floor(r), half = (r - full) >= 0.5;
        return "★".repeat(full) + (half ? "½" : "");
      }

      function ago(iso) {
        var d = new Date(iso);
        if (isNaN(d)) return "";
        var days = Math.floor((Date.now() - d) / 86400000);
        if (days <= 0) return "updated today";
        if (days === 1) return "updated yesterday";
        return "updated " + days + " days ago";
      }

      function item(label, body) {
        return '<article class="now-item"><div class="now-label">' + label +
               '</div><div class="now-body">' + body + '</div></article>';
      }

      function mediaBody(img, title, sub, st) {
        var thumb = img ? '<img class="now-thumb" src="' + esc(img) + '" alt="" loading="lazy">' : "";
        var t = '<div class="now-text"><div class="now-title">' + title + '</div>';
        if (sub) t += '<div class="now-sub">' + sub + "</div>";
        if (st) t += '<div class="now-stars">' + st + "</div>";
        t += "</div>";
        return thumb + t;
      }

      function song(track) {
        if (!track || !track.name) return '<span class="sub">&mdash;</span>';
        return '<span class="song-title">' + esc(track.name) +
               ' <span class="sub">&middot; ' + esc(track.artist) + "</span></span>";
      }

      fetch("me-data.json?_=" + Date.now())
        .then(function (r) { return r.json(); })
        .then(function (d) {
          var html = "";

          if (d.book && d.book.title) {
            var bookLabel = d.book.status === "read" ? "Last read" : "Reading";
            html += item(bookLabel, mediaBody(
              d.book.cover,
              esc(d.book.title),
              "by " + esc(d.book.author),
              stars(d.book.rating)));
          }

          if (d.music && (d.music.week || d.music.month)) {
            var lis = "";
            if (d.music.week)  lis += '<li><span class="song-when">This week</span>'  + song(d.music.week)  + "</li>";
            if (d.music.month) lis += '<li><span class="song-when">This month</span>' + song(d.music.month) + "</li>";
            html += item("Listening", '<ul class="songs">' + lis + "</ul>");
          }

          if (d.films && d.films.length) {
            var posters = d.films.map(function (f) {
              var st = stars(f.rating);
              var cap = esc(f.title) + (f.year ? " (" + esc(f.year) + ")" : "");
              return '<figure class="film">' +
                (f.poster ? '<img src="' + esc(f.poster) + '" alt="' + esc(f.title) + '" title="' + cap + '" loading="lazy">' : "") +
                (st ? '<figcaption class="now-stars">' + st + "</figcaption>" : "") +
                "</figure>";
            }).join("");
            html += item("Watching", '<div class="films">' + posters + "</div>");
          }

          if (!html) {
            now.innerHTML = '<p class="now-msg">Nothing to show right now &mdash; check back soon.</p>';
            return;
          }
          if (d.updated) html += '<p class="now-foot">' + ago(d.updated) + "</p>";
          now.innerHTML = html;
        })
        .catch(function () {
          now.innerHTML = '<p class="now-msg">Couldn&rsquo;t load this right now.</p>';
        });
    })();
  </script>
</body>
</html>
